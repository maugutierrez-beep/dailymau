async function loadAdmin(){
  if(getUserEmail().toLowerCase()!=='maugutierrez@gmail.com'){document.getElementById('scroll').innerHTML=emptyState('Acceso restringido',T('Esta sección es solo para el administrador.'));return}
  let rows=[];
  try{const r=await fetch(`${CLOUD.url}/rest/v1/${CLOUD.table}?select=id,data,updated_at`,{headers:hGet()});
    if(r.status===401){if(await refreshToken()){return loadAdmin()}}
    rows=await r.json();}catch(e){document.getElementById('scroll').innerHTML=emptyState('Error','No se pudieron cargar los datos.');return}
  // Solo filas de usuario (u_*)
  const users=rows.filter(r=>String(r.id).startsWith('u_')).map(r=>{
    let d=r.data;try{if(typeof d==='string')d=JSON.parse(d)}catch(e){d={}}
    const m=(d&&d.meta)||{};const tasks=(d&&d.tasks)||[];
    const projects=(d&&d.projects)||[];
    const people=(d&&d.people)||[];
    const openTasks=tasks.filter(t=>t.status!=='completado'&&t.status!=='cancelado');
    const overdue=openTasks.filter(t=>t.due&&new Date(t.due)<new Date()).length;
    const recurring=tasks.filter(t=>t.repeat&&t.repeat!=='none').length;
    const withPeople=tasks.filter(t=>t.responsible&&t.responsible!=='Yo'&&t.responsible!=='').length;
    const profileName=(d&&d.profile&&d.profile.name)||'';
    const hasPhoto=!!(d&&d.profile&&d.profile.photo);
    return {id:r.id,email:m.email||'(sin correo)',createdAt:m.createdAt||null,lastActive:m.lastActive||r.updated_at,
      taskCount:tasks.length,doneCount:tasks.filter(t=>t.status==='completado').length,
      openCount:openTasks.length,overdueCount:overdue,recurringCount:recurring,
      projectCount:projects.filter(p=>p.id!=='general').length,
      peopleCount:people.length,delegatedCount:withPeople,
      profileName,hasPhoto,updated:r.updated_at};
  });
  document.getElementById('scroll').innerHTML=renderAdmin(users);wireAdminDelete();
}

async function deleteUserData(uid,email,taskCount){
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<div class="modal" style="max-width:420px">
    <div class="modal-h"><div><div style="font-family:var(--font-display);font-size:19px;font-weight:600;color:#c0392b">⚠ ${T('Eliminar datos de usuario')}</div></div></div>
    <div class="modal-b">
      <p style="font-size:14px;line-height:1.6;color:var(--ink-2)">${T('Vas a borrar TODOS los datos de')} <b>${escapeH(email)}</b> (${taskCount} ${T('tareas')}). ${T('Esta acción no se puede deshacer.')}</p>
      <p style="font-size:13px;color:var(--ink-3);margin-top:10px">${T('Para confirmar, escribe el correo exacto:')}</p>
      <input id="delConfirmInput" placeholder="${escapeAttr(email)}" style="width:100%;margin-top:8px">
    </div>
    <div class="modal-f"><div></div><div style="display:flex;gap:8px">
      <button class="btn-ghost" id="delCancel">${T('Cancelar')}</button>
      <button class="btn-primary" id="delConfirmBtn" style="background:#c0392b" disabled>${T('Eliminar definitivamente')}</button>
    </div></div>
  </div>`;
  ov.classList.add('show');
  const inp=document.getElementById('delConfirmInput');
  const btn=document.getElementById('delConfirmBtn');
  inp.oninput=()=>{btn.disabled=(inp.value.trim().toLowerCase()!==email.toLowerCase())};
  document.getElementById('delCancel').onclick=()=>ov.classList.remove('show');
  btn.onclick=async()=>{
    btn.disabled=true;btn.textContent=T('Eliminando…');
    try{
      const r=await fetch(`${CLOUD.url}/rest/v1/${CLOUD.table}?id=eq.${encodeURIComponent(uid)}`,{method:'DELETE',headers:hGet()});
      if(r.ok){ov.classList.remove('show');toast(T('Usuario eliminado')+': '+email);loadAdmin()}

  };
}

function renderAdmin(users){
  const now=Date.now(),DAY=86400000,WEEK=7*DAY;
  const L=LANG==='en';
  
  // ── Métricas ──
  const total=users.length;
  const active1=users.filter(u=>u.lastActive&&(now-new Date(u.lastActive))<DAY).length;
  const active7=users.filter(u=>u.lastActive&&(now-new Date(u.lastActive))<WEEK).length;
  const active30=users.filter(u=>u.lastActive&&(now-new Date(u.lastActive))<30*DAY).length;
  const new7=users.filter(u=>u.createdAt&&(now-new Date(u.createdAt))<WEEK).length;
  const new30=users.filter(u=>u.createdAt&&(now-new Date(u.createdAt))<30*DAY).length;
  const prevNew7=users.filter(u=>u.createdAt&&(now-new Date(u.createdAt))>=WEEK&&(now-new Date(u.createdAt))<2*WEEK).length;
  const prevActive7=users.filter(u=>u.lastActive&&(now-new Date(u.lastActive))>=WEEK&&(now-new Date(u.lastActive))<2*WEEK).length;
  const totalTasks=users.reduce((s,u)=>s+u.taskCount,0);
  const totalDone=users.reduce((s,u)=>s+u.doneCount,0);
  const totalOpen=users.reduce((s,u)=>s+u.openCount,0);
  const totalOverdue=users.reduce((s,u)=>s+(u.overdueCount||0),0);
  const totalDelegated=users.reduce((s,u)=>s+(u.delegatedCount||0),0);
  const avgTasks=total?+(totalTasks/total).toFixed(1):0;
  const avgOpen=total?+(totalOpen/total).toFixed(1):0;
  const completionRate=totalTasks?Math.round(totalDone/totalTasks*100):0;
  const engagementRate=total?Math.round(active7/total*100):0;
  const dauMau=active30?Math.round(active1/active30*100):0;
  
  // Segmentos
  const ghosts=users.filter(u=>u.taskCount===0).length;
  const power=users.filter(u=>u.taskCount>=20).length;
  const regular=users.filter(u=>u.taskCount>=5&&u.taskCount<20).length;
  const light=users.filter(u=>u.taskCount>0&&u.taskCount<5).length;
  
  // Tendencias
  const trend=(cur,prev)=>{
    if(!prev&&!cur)return'';
    if(!prev&&cur)return`<span class="adm-trend up">↑ nuevo</span>`;
    const p=Math.round((cur-prev)/prev*100);
    if(p>0)return`<span class="adm-trend up">↑${p}%</span>`;
    if(p<0)return`<span class="adm-trend down">↓${Math.abs(p)}%</span>`;
    return`<span class="adm-trend flat">→</span>`;
  };
  
  // Power user
  const powerUser=[...users].sort((a,b)=>b.taskCount-a.taskCount)[0];
  const newestUser=[...users].filter(u=>u.createdAt).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))[0];
  
  // Gráfico 30 días (registros + activos)
  const days30=[];
  for(let i=29;i>=0;i--){
    const ds=new Date(now-i*DAY);ds.setHours(0,0,0,0);
    const de=new Date(ds.getTime()+DAY);
    days30.push({
      day:ds,isToday:i===0,
      signups:users.filter(u=>u.createdAt&&new Date(u.createdAt)>=ds&&new Date(u.createdAt)<de).length,
      active:users.filter(u=>u.lastActive&&new Date(u.lastActive)>=ds&&new Date(u.lastActive)<de).length
    });
  }
  const maxBar=Math.max(1,...days30.map(d=>Math.max(d.signups,d.active)));
  const bh=(v)=>Math.max(v?2:0,Math.round(v/maxBar*68));
  
  const card=(label,val,sub='',tr='')=>`<div class="adm-card"><div class="adm-val">${val}${tr}</div><div class="adm-label">${label}</div>${sub?`<div class="adm-sub">${sub}</div>`:''}</div>`;
  
  let h='';
  
  // ── HEADER ──
  h+=`<div class="adm-header">
    <h2>Dashboard</h2>
    <p>${L?'Real-time user activity and product metrics':'Actividad y métricas del producto en tiempo real'}</p>
  </div>`;
  
  // ── KPI GRID ──
  h+='<div class="adm-grid">';
  h+=card(L?'Total users':'Usuarios totales',total,L?'all time':'en total');
  h+=card(L?'Active today':'Activos hoy',active1,L?'last 24h':'últimas 24h');
  h+=card(L?'Active 7d':'Activos 7d',active7,`${engagementRate}% engagement`,trend(active7,prevActive7));
  h+=card(L?'Active 30d':'Activos 30d',active30,L?'monthly active':'activos mensuales');
  h+=card(L?'New this week':'Nuevos semana',new7,L?'last 7 days':'últimos 7 días',trend(new7,prevNew7));
  h+=card(L?'New this month':'Nuevos mes',new30);
  h+=card(L?'DAU/MAU':'DAU/MAU',dauMau+'%',L?'daily engagement':'engagement diario');
  h+=card(L?'Completion rate':'% completado',completionRate+'%',`${totalDone}/${totalTasks}`);
  h+=card(L?'Avg tasks/user':'Promedio tareas',avgTasks,L?'per user':'por usuario');
  h+=card(L?'Avg open/user':'Pendientes/usr',avgOpen,L?'open tasks avg':'media pendientes');
  h+=card(L?'Overdue total':'Vencidas total',totalOverdue,L?'across all users':'en todas las cuentas');
  h+=card(L?'Delegated tasks':'Tareas delegadas',totalDelegated,L?'assigned to others':'asignadas a otros');
  h+='</div>';
  
  // ── FILA: FUNNEL + SEGMENTOS ──
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">`;
  
  // Funnel de activación
  h+=`<div class="adm-chart-wrap">
    <div class="adm-chart-header"><div class="adm-chart-title">${L?'Activation funnel':'Embudo de activación'}</div></div>
    ${[
      {label:L?'Registered':'Registrados',val:total,color:'var(--accent)',pct:100},
      {label:L?'Used the app':'Usaron la app',val:total-ghosts,color:'#60a5fa',pct:total?Math.round((total-ghosts)/total*100):0},
      {label:L?'Active 30d':'Activos 30d',val:active30,color:'#4ade80',pct:total?Math.round(active30/total*100):0},
      {label:L?'Active 7d':'Activos 7d',val:active7,color:'#4ade80',pct:total?Math.round(active7/total*100):0},
      {label:L?'Active today':'Activos hoy',val:active1,color:'#facc15',pct:total?Math.round(active1/total*100):0},
    ].map(row=>`<div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-size:12px;color:var(--ink-2)">${row.label}</span>
        <span style="font-size:12px;font-weight:600;color:var(--ink)">${row.val} <span style="color:var(--ink-3);font-weight:400">(${row.pct}%)</span></span>
      </div>
      <div style="height:6px;background:var(--bg-3);border-radius:3px">
        <div style="height:6px;background:${row.color};border-radius:3px;width:${row.pct}%;opacity:.85"></div>
      </div>
    </div>`).join('')}
  </div>`;
  
  // Segmentos de usuario
  h+=`<div class="adm-chart-wrap">
    <div class="adm-chart-header"><div class="adm-chart-title">${L?'User segments':'Segmentos de usuario'}</div></div>
    ${[
      {label:L?'👻 Ghost (0 tasks)':'👻 Fantasma (0 tareas)',val:ghosts,color:'var(--ink-3)'},
      {label:L?'🌱 Light (1-4 tasks)':'🌱 Ligero (1-4 tareas)',val:light,color:'#60a5fa'},
      {label:L?'⚡ Regular (5-19 tasks)':'⚡ Regular (5-19 tareas)',val:regular,color:'var(--accent)'},
      {label:L?'🚀 Power (20+ tasks)':'🚀 Power (20+ tareas)',val:power,color:'#4ade80'},
    ].map(seg=>{
      const pct=total?Math.round(seg.val/total*100):0;
      return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:32px;height:32px;border-radius:8px;background:${seg.color};opacity:.15;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px">${seg.label.split(' ')[0]}</div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;margin-bottom:2px">
            <span style="font-size:12px;color:var(--ink-2)">${seg.label.split(') ')[1]||seg.label}</span>
            <span style="font-size:12.5px;font-weight:700;color:var(--ink)">${seg.val}</span>
          </div>
          <div style="height:5px;background:var(--bg-3);border-radius:3px">
            <div style="height:5px;background:${seg.color};border-radius:3px;width:${pct}%;opacity:.8"></div>
          </div>
        </div>
      </div>`;
    }).join('')}
    ${ghosts>0?`<div style="margin-top:8px;padding:8px 10px;background:rgba(239,68,68,.07);border-radius:8px;font-size:11.5px;color:#ef4444">⚠ ${ghosts} ${L?`user${ghosts>1?'s':''} registered but never created a task`:`usuario${ghosts>1?'s':''} se registró pero nunca creó una tarea`}</div>`:''}
  </div>`;
  
  h+='</div>';
  
  // ── GRÁFICO 30 DÍAS ──
  h+=`<div class="adm-chart-wrap" style="margin-bottom:20px">
    <div class="adm-chart-header">
      <div class="adm-chart-title">${L?'Activity — last 30 days':'Actividad — últimos 30 días'}</div>
      <div style="display:flex;gap:14px;font-size:11.5px;color:var(--ink-3)">
        <span style="display:flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:var(--accent);opacity:.8;display:inline-block"></span>${L?'Signups':'Registros'}</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:#4ade80;opacity:.85;display:inline-block"></span>${L?'Active':'Activos'}</span>
      </div>
    </div>
    <div style="display:flex;gap:3px;align-items:flex-end;height:76px">
      ${days30.map((d,i)=>{
        const label=(i===0||i===6||i===13||i===20||i===27)?d.day.toLocaleDateString(L?'en':'es',{day:'numeric',month:'short'}):'';
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end"
          title="${d.day.toLocaleDateString()}: ${d.signups} ${L?'signups':'registros'}, ${d.active} ${L?'active':'activos'}">
          <div style="width:100%;display:flex;align-items:flex-end;gap:1px;height:68px;justify-content:center">
            <div style="width:44%;background:var(--accent);opacity:${d.isToday?1:.7};border-radius:2px 2px 0 0;height:${bh(d.signups)}px"></div>
            <div style="width:44%;background:#4ade80;opacity:.8;border-radius:2px 2px 0 0;height:${bh(d.active)}px"></div>
          </div>
          <div style="font-size:7px;color:var(--ink-3);white-space:nowrap">${label}</div>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)">
      <span style="font-size:11.5px;color:var(--ink-3)">${L?`${new30} signups this month`:`${new30} registros este mes`}</span>
      <span style="font-size:11.5px;color:var(--ink-3)">${L?`${active30} active users`:`${active30} usuarios activos`}</span>
    </div>
  </div>`;
  
  // ── HIGHLIGHTS ──
  const highlights=[];
  if(powerUser)highlights.push({icon:'🏆',label:L?'Most active user':'Usuario más activo',val:`${powerUser.profileName||powerUser.email.split('@')[0]} · ${powerUser.taskCount} ${L?'tasks':'tareas'}`});
  if(newestUser)highlights.push({icon:'🆕',label:L?'Latest signup':'Último registro',val:`${newestUser.email} · ${Math.floor((now-new Date(newestUser.createdAt))/DAY)}d ${L?'ago':'atrás'}`});
  highlights.push({icon:'📊',label:L?'Engagement rate':'Tasa de engagement',val:`${engagementRate}% ${L?'of users active in last 7 days':'de usuarios activos en 7 días'}`});
  if(totalOverdue>0)highlights.push({icon:'⏰',label:L?'Overdue tasks':'Tareas vencidas',val:`${totalOverdue} ${L?'tasks past due date':'tareas pasaron su fecha'}`});
  if(dauMau>0)highlights.push({icon:'💡',label:'DAU/MAU',val:`${dauMau}% — ${dauMau>20?L?'healthy engagement':'buen engagement':L?'low — needs attention':'bajo — requiere atención'}`});
  
  if(highlights.length){
    h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:20px">`;
    h+=highlights.map(hl=>`<div style="background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px">
      <span style="font-size:20px">${hl.icon}</span>
      <div><div style="font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">${hl.label}</div>
      <div style="font-size:13px;font-weight:600;color:var(--ink)">${hl.val}</div></div>
    </div>`).join('');
    h+='</div>';
  }
  
  // ── TABLA DE USUARIOS ──
  if(!users.length){h+=`<div style="text-align:center;padding:40px;color:var(--ink-3)">${L?'No users yet.':'Aún no hay usuarios.'}</div>`;return h}
  
  const fmt=(d)=>d?new Date(d).toLocaleDateString(L?'en':'es',{day:'numeric',month:'short',year:'2-digit'}):'—';
  const statusChip=(u)=>{
    if(!u.lastActive&&!u.taskCount)return`<span class="adm-status inactive">👻 ${L?'Never active':'Nunca activo'}</span>`;
    if(!u.lastActive)return`<span class="adm-status new">${L?'New':'Nuevo'}</span>`;
    const diff=(now-new Date(u.lastActive))/DAY;
    const isNew=(now-new Date(u.createdAt))<3*DAY;
    if(isNew&&diff<3)return`<span class="adm-status new">🌱 ${L?'New':'Nuevo'}</span>`;
    if(diff<1)return`<span class="adm-status active">🟢 ${L?'Active today':'Activo hoy'}</span>`;
    if(diff<2)return`<span class="adm-status active">🔵 ${L?'Yesterday':'Ayer'}</span>`;
    if(diff<7)return`<span class="adm-status active">🔵 ${Math.floor(diff)}d ${L?'ago':'atrás'}</span>`;
    if(diff<14)return`<span class="adm-status recent">🟡 ${Math.floor(diff)}d ${L?'ago':'atrás'}</span>`;
    return`<span class="adm-status inactive">⚫ ${Math.floor(diff)}d ${L?'ago':'atrás'}</span>`;
  };
  
  const sorted=users.sort((a,b)=>new Date(b.lastActive||0)-new Date(a.lastActive||0));
  h+=`<div class="adm-table-header"><div class="adm-table-title">${L?'Users':'Usuarios'}</div><div class="adm-table-count">${total}</div></div>`;
  h+='<div class="adm-table"><table><thead><tr>';
  h+=`<th>${L?'User':'Usuario'}</th><th>${L?'Status':'Estado'}</th><th>${L?'Signed up':'Registro'}</th>`;
  h+=`<th>📝</th><th>✅</th><th>📂</th><th>👥</th><th></th>`;
  h+='</tr></thead><tbody>';
  sorted.forEach(u=>{
    const isYou=u.email.toLowerCase()==='maugutierrez@gmail.com';
    const name=u.profileName||'';
    h+=`<tr>
      <td>
        <div class="adm-email">${escapeH(u.email)}${isYou?` <span class="adm-you">${L?'you':'tú'}</span>`:''}</div>
        ${name?`<div class="adm-meta">${escapeH(name)}</div>`:''}
      </td>
      <td>${statusChip(u)}</td>
      <td><div style="font-size:12px">${fmt(u.createdAt)}</div></td>
      <td><b>${u.taskCount}</b></td>
      <td style="color:var(--ink-3)">${u.doneCount}</td>
      <td style="color:var(--ink-3)">${u.projectCount||0}</td>
      <td style="color:var(--ink-3)">${u.peopleCount||0}</td>
      <td>${isYou?'':`<button class="adm-del" data-uid="${escapeAttr(u.id)}" data-email="${escapeAttr(u.email)}" data-tasks="${u.taskCount}" title="${T('Eliminar datos de este usuario')}">${svg(I.trash,13)}</button>`}</td>
    </tr>`;
  });
  h+='</tbody></table></div>';
  
  // Leyenda de columnas
  h+=`<div style="font-size:11px;color:var(--ink-3);margin-top:8px;display:flex;gap:16px;flex-wrap:wrap">
    <span>📝 ${L?'Tasks':'Tareas'}</span><span>✅ ${L?'Done':'Hechas'}</span>
    <span>📂 ${L?'Projects':'Proyectos'}</span><span>👥 ${L?'People':'Personas'}</span>
  </div>`;
  
  return h;
}

function renderReview(){
  const open=TASKS.filter(isOpen),am=state.revMode==='am';
  let h=`<div class="review-toggle"><button class="${am?'on':''}" data-rev="am>${LANG==='en'?'☀ Tomorrow':'☀ Mañana'}</button><button class="${!am?'on':''}" data-rev="pm">🌙 Noche</button></div>`;
  const mineToday=open.filter(t=>isMine(t)&&t.due&&daysFrom(t.due)<=0).sort(byDate);
  if(am){
    const top3=[...mineToday].sort((a,b)=>(b.flag?1:0)-(a.flag?1:0)).slice(0,3);
    const carried=mineToday.filter(t=>t.carried>0);
    const segs=open.filter(t=>(t.type==='seguimiento'||t.status==='esperando')&&t.nextReview&&daysFrom(t.nextReview)<=0);
    h+=`<div class="rev-grid">
      <div class="rev-card focus-card"><h4>${svg(I.sparkle,15)} Enfoque para hoy</h4><div class="fc-big">${top3.length?`Tienes <b>${mineToday.length}</b> tarea(s) hoy. Empieza por <b>"${escapeH(top3[0].title)}"</b>${carried.length?`, y cierra las <b>${carried.length}</b> que vienen arrastrándose`:''}.`:'Día despejado en tus tareas. Buen momento para adelantar algo estratégico o revisar lo que supervisas.'}</div></div>
      <div class="rev-card"><h4>${T('Top 3 del día')}</h4>${top3.length?top3.map(revLi).join(''):'<div style="color:var(--ink-3);font-size:13px">Nada urgente.</div>'}</div>
      <div class="rev-card"><h4 style="color:var(--amber)">Arrastradas (${carried.length})</h4>${carried.length?carried.map(revLi).join(''):'<div style="color:var(--ink-3);font-size:13px">Nada se quedó atrás. 👏</div>'}</div>
      <div class="rev-card"><h4>Seguimientos para hoy (${segs.length})</h4>${segs.length?segs.map(revLi).join(''):'<div style="color:var(--ink-3);font-size:13px">Sin seguimientos hoy.</div>'}</div>
    </div>`;
  }else{
    const doneToday=TASKS.filter(t=>isDone(t)&&t.completedAt===todayStr());
    const stale=open.filter(t=>staleDays(t)>=5).sort((a,b)=>staleDays(b)-staleDays(a)).slice(0,6);
    h+=`<div class="rev-grid">
      <div class="rev-card focus-card"><h4>${svg(I.sparkle,15)} Cierre del día</h4><div class="fc-big">Realizaste <b>${doneToday.length}</b> tarea(s) hoy${mineToday.length?` y quedan <b>${mineToday.length}</b> abierta(s)</b>, que pasarán solas a mañana.`:'. '+T('Todo lo tuyo quedó cerrado.')}</div></div>
      <div class="rev-card"><h4 style="color:var(--green)">Realizado hoy (${doneToday.length})</h4>${doneToday.length?doneToday.map(t=>`<div class="rev-li" data-id="${t.id}"><span class="rd" style="background:var(--green)"></span>${escapeH(t.title)}</div>`).join(''):'<div style="color:var(--ink-3);font-size:13px">'+T('Aún nada marcado.')+'</div>'}</div>
      <div class="rev-card"><h4>Pasarán a mañana (${mineToday.length})</h4>${mineToday.length?mineToday.map(t=>`<div class="rev-li" data-id="${t.id}"><span class="rd" style="background:${proj(t.project).color}"></span><span style="flex:1">${escapeH(t.title)}</span><span style="font-size:11px;color:var(--accent)">↻ auto</span></div>`).join(''):'<div style="color:var(--ink-3);font-size:13px">Nada pendiente.</div>'}<div style="font-size:11.5px;color:var(--ink-3);margin-top:8px">Lo no realizado se arrastra automáticamente al abrir mañana.</div></div>
      <div class="rev-card"><h4>Sin avance hace días (${stale.length})</h4>${stale.length?stale.map(t=>`<div class="rev-li" data-id="${t.id}"><span class="rd" style="background:var(--amber)"></span><span style="flex:1">${escapeH(t.title)}</span><span style="font-size:11px;color:var(--amber)">${staleDays(t)}d</span></div>`).join(''):'<div style="color:var(--ink-3);font-size:13px">Todo se ha movido recientemente.</div>'}</div>
    </div>`;
  }
  return h;
}
function revLi(t){return `<div class="rev-li" data-id="${t.id}"><span class="rd" style="background:${proj(t.project).color}"></span><span style="flex:1">${escapeH(t.title)}</span>${t.due?`<span style="font-size:11px;color:var(--ink-3)">${dueLabel(t.due)}</span>`:''}</div>`}
function bindReview(){document.querySelectorAll('[data-rev]').forEach(b=>b.onclick=()=>{state.revMode=b.dataset.rev;render()});document.querySelectorAll('.rev-li[data-id]').forEach(e=>e.onclick=()=>select(e.dataset.id))}

function openRespPicker(t){
  const existing=document.getElementById('respPop');if(existing)existing.remove();
  const sel=respList(t);
  const ppl=allPeople();
  const pop=document.createElement('div');pop.id='respPop';pop.className='resp-pop';
  pop.innerHTML=`<div class="resp-pop-h">${T('Asignar responsables')}</div>
    <div class="resp-pop-list">${ppl.map(n=>`<label class="resp-opt"><input type="checkbox" value="${escapeAttr(n)}" ${sel.includes(n)?'checked':''}><span class="av" style="background:${colorFor(n)}">${initials(n)}</span><span>${n==='Yo'?'Yo ('+escapeH(myName())+')':escapeH(n)}</span></label>`).join('')}</div>
    <div class="resp-pop-f"><button type="button" id="respNew">➕ Nueva persona</button><button type="button" id="respDone" class="btn-primary">${T('Listo')}</button></div>`;
  document.body.appendChild(pop);
  const btn=document.getElementById('respBtn');const r=btn.getBoundingClientRect();
  pop.style.top=(r.bottom+6+window.scrollY)+'px';pop.style.left=Math.min(r.left,window.innerWidth-300)+'px';
  const apply=()=>{const checked=[...pop.querySelectorAll('input:checked')].map(c=>c.value);t.responsible=checked.join(', ');logH(t,'Responsables: '+respFull(t));save();render()};
  pop.querySelectorAll('input').forEach(c=>c.onchange=apply);
  document.getElementById('respDone').onclick=()=>{
    const respAfter=respList(t).filter(r=>r&&r!=='Yo'&&r!=='')[0];
    pop.remove();cloudSave();
    if(respAfter) setTimeout(()=>showWaTooltip(respAfter,null),500);
  };
  document.getElementById('respNew').onclick=()=>{const n=prompt('Nombre de la nueva persona:');if(n&&n.trim()){const nm=n.trim();if(!PEOPLE.includes(nm)&&normPerson(nm)!=='Yo')PEOPLE.push(nm);const cur=respList(t);cur.push(nm);t.responsible=cur.join(', ');save();pop.remove();openRespPicker(TASKS.find(x=>x.id===t.id))}};
  setTimeout(()=>{const close=(e)=>{if(!pop.contains(e.target)&&e.target.id!=='respBtn'){pop.remove();document.removeEventListener('mousedown',close)}};document.addEventListener('mousedown',close)},100);
}

function bindDetail(t){
  const az=(el)=>{el.style.height='auto';el.style.height=el.scrollHeight+'px'};
  const dt=document.getElementById('dTitle');az(dt);dt.oninput=()=>{az(dt);t.title=dt.value;save()};dt.onblur=()=>render();
  const dd=document.getElementById('dDesc');az(dd);dd.oninput=()=>{az(dd);t.description=dd.value;save()};
  const rb=document.getElementById('respBtn');if(rb)rb.onclick=()=>openRespPicker(t);
  document.getElementById('dNext').oninput=(e)=>{t.nextAction=e.target.value;save()};document.getElementById('dNext').onblur=()=>render();
  document.querySelectorAll('[data-f]').forEach(el=>el.onchange=()=>{const f=el.dataset.f,old=t[f];
    
    t[f]=el.value;
    if(f==='status'&&el.value==='completado'&&!t.completedAt)t.completedAt=todayStr();
    if(f==='status'&&el.value!=='completado')t.completedAt='';
    logH(t,`${labelF(f)}: ${valLabel(f,old)} → ${valLabel(f,el.value)}`);save();render()});
  document.getElementById('dNoteAdd').onclick=addNote;document.getElementById('dNote').onkeydown=(e)=>{if(e.key==='Enter')addNote()};
  // Subtareas
  const subAdd=document.getElementById('dSubtAdd');
  function addSubt(){const inp=document.getElementById('dSubt');const v=inp.value.trim();if(!v)return;t.subtasks=t.subtasks||[];t.subtasks.push({text:v,done:false});save();render()}
  if(subAdd){subAdd.onclick=addSubt;document.getElementById('dSubt').onkeydown=(e)=>{if(e.key==='Enter')addSubt()}}
  document.querySelectorAll('[data-subt]').forEach(c=>c.onchange=()=>{const i=+c.dataset.subt;t.subtasks[i].done=c.checked;save();render()});
  document.querySelectorAll('[data-subtdel]').forEach(b=>b.onclick=()=>{const i=+b.dataset.subtdel;t.subtasks.splice(i,1);save();render()});
  function addNote(){const v=document.getElementById('dNote').value.trim();if(!v)return;t.notes=t.notes||[];t.notes.push({date:todayStr(),text:v});logH(t,'Nota agregada');save();render()}
  document.querySelectorAll('[data-d]').forEach(b=>b.onclick=()=>{const a=b.dataset.d;
    if(a==='close'){state.sel=null;render()}
    else if(a==='complete'){toggleComplete(t.id);render()}
    else if(a==='snooze'){snooze(t.id);render();toast(T('Pasada a mañana'))}
    else if(a==='follow'){toFollow(t.id);render();toast('Convertida en seguimiento')}
    else if(a==='delegate'){delegate(t.id);render()}
    else if(a==='delete'){const tk=TASKS.find(x=>x.id===t.id);if(tk){tk.deleted=Date.now();state.sel=null;save();render();toast('Tarea eliminada',()=>{delete tk.deleted;save();render();toast('Restaurada ✓')})}}
    else if(a==='dup'){const c=JSON.parse(JSON.stringify(t));c.id=uid();c.title+=' (copia)';c.history=[{d:todayStr(),t:'Duplicada'}];c.completedAt='';c.status='no_iniciado';c.carried=0;TASKS.unshift(c);state.sel=c.id;save();render();toast('Duplicada')}});
}
function labelF(f){return {project:'Proyecto',type:'Tipo',status:'Estado',due:'Día',nextReview:'Próx. seguimiento',responsible:'Responsable',relatedPerson:'Persona',channel:'Canal',links:'Enlace',repeat:'Repetir',remind:'Recordatorio'}[f]||f}
function valLabel(f,v){if(f==='project')return projName(v);if(f==='type')return typeOf(v).name;if(f==='status')return statusName(v);if(f==='repeat')return({daily:'Cada día',weekly:'Cada semana',biweekly:'Cada 2 semanas',monthly:'Cada mes'}[v]||'No repetir');if(f==='remind')return({same:'El día',before1:'1 día antes',before2:'2 días antes'}[v]||'Sin recordatorio');return v||'—'}
function logH(t,txt){t.history=t.history||[];t.history.push({d:todayStr(),t:txt})}

/* ---- ACCIONES ---- */
function nextRepeatDate(base,rep){const d=new Date((base||todayStr())+'T00:00');if(isNaN(d.getTime()))return null;if(rep==='daily')d.setDate(d.getDate()+1);else if(rep==='weekly')d.setDate(d.getDate()+7);else if(rep==='biweekly')d.setDate(d.getDate()+14);else if(rep==='monthly')d.setMonth(d.getMonth()+1);else return null;return localISO(d)}
function spawnRecurrence(t){if(!t.repeat)return;const nd=nextRepeatDate(t.due||todayStr(),t.repeat);if(!nd)return;const c=JSON.parse(JSON.stringify(t));c.id=uid();c.status='no_iniciado';c.completedAt='';c.carried=0;c.due=nd;c.createdAt=todayStr();c.history=[{d:todayStr(),t:'Creada (recurrente)'}];if(c.subtasks)c.subtasks.forEach(s=>s.done=false);TASKS.unshift(c)}
function toggleComplete(id){const t=TASKS.find(x=>x.id===id);if(!t)return;if(isDone(t)){t.status='en_proceso';t.completedAt='';logH(t,'Reabierta')}else{t.status='completado';t.completedAt=todayStr();logH(t,'Realizada');spawnRecurrence(t)}save()}
function snooze(id){const t=TASKS.find(x=>x.id===id);if(!t)return;t.due=addD(1);if(t.status==='no_iniciado')t.status='pospuesto';logH(t,'Pasada a mañana');save()}
function toFollow(id){const t=TASKS.find(x=>x.id===id);if(!t)return;t.type='seguimiento';t.status='esperando';if(!t.nextReview)t.nextReview=addD(2);if(!t.lastContact)t.lastContact=todayStr();logH(t,'Convertida en seguimiento');save()}
function delegate(id){const t=TASKS.find(x=>x.id===id);if(!t)return;const who=prompt('¿A quién se la asignas / quién es responsable?',isMine(t)?'':t.responsible);if(who===null)return;t.responsible=who.trim()||'(sin asignar)';if(t.type==='tarea')t.type='seguimiento';if(t.status==='no_iniciado')t.status='esperando';if(!t.nextReview)t.nextReview=addD(3);if(!t.nextAction)t.nextAction='Hacer seguimiento si no responde';logH(t,`Asignada a ${t.responsible}`);save();toast('Asignada a '+normPerson(t.responsible))}

/* ---- CONFETI ---- */
function confetti(x,y){
  const colors=['#EF7746','#1A3352','#f0b429','#3f9d9d','#c2607a','#5a9d52'];
  const n=28;
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='confetti-bit';
    const c=colors[i%colors.length];const sz=6+Math.random()*6;
    p.style.cssText=`position:fixed;left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${c};z-index:9999;pointer-events:none;border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(p);
    const ang=(Math.PI*2*i/n)+(Math.random()-.5);const vel=4+Math.random()*5;
    const vx=Math.cos(ang)*vel;let vy=Math.sin(ang)*vel-3;let px=x,py=y,rot=Math.random()*360;const vr=(Math.random()-.5)*20;
    let life=0;
    const tick=()=>{life++;vy+=.32;px+=vx;py+=vy;rot+=vr;
      p.style.transform=`translate(${px-x}px,${py-y}px) rotate(${rot}deg)`;
      p.style.opacity=Math.max(0,1-life/46);
      if(life<46)requestAnimationFrame(tick);else p.remove()};
    requestAnimationFrame(tick);
  }
}

function buildDayText(){
  const today=TASKS.filter(t=>isOpen(t)&&t.due&&daysFrom(t.due)<=0).sort(byDate);
  const byproj={};today.forEach(t=>{(byproj[t.project]=byproj[t.project]||[]).push(t)});
  const projOrder=PROJECTS.map(p=>p.id);
  const order=Object.keys(byproj).sort((a,b)=>{const ia=projOrder.indexOf(a),ib=projOrder.indexOf(b);return (ia<0?999:ia)-(ib<0?999:ib)});
  let txt='📋 Mi día — '+new Date().toLocaleDateString('es',{weekday:'long',day:'numeric',month:'long'})+'\n\n';
  if(!today.length)return txt+T('Sin tareas para hoy.');
  order.forEach(pid=>{txt+='*'+projName(pid)+'*\n';byproj[pid].forEach(t=>{
    txt+='• '+t.title;
    const resp=respList(t).filter(r=>r!=='Yo');
    if(resp.length)txt+=' ('+resp.join(', ')+')';
    txt+='\n';
  });txt+='\n'});
  return txt.trim();
}

        : desktop
        ? 'Busca el ícono de instalar '+svg('<path d="M12 3v12M8 11l4 4 4-4M4 19h16" fill="none"/>',13)+' en la barra de direcciones del navegador, o usa el menú del navegador → “Instalar jazzdoit”.'
        : T('Tócala una vez para instalarla y tenerla como app, con su ícono y a pantalla completa.')}</div>
      ${(ios||desktop)?'':'<button class="install-cta" id="installCta">Instalar app</button>'}
    </div>`;
  document.body.appendChild(b);
  requestAnimationFrame(()=>b.classList.add('show'));
  document.getElementById('installX').onclick=()=>{markInstallDone();b.classList.remove('show');setTimeout(()=>b.remove(),300)};
  const cta=document.getElementById('installCta');
  if(cta)cta.onclick=async()=>{
    if(_deferredPrompt){_deferredPrompt.prompt();const r=await _deferredPrompt.userChoice;_deferredPrompt=null;markInstallDone();b.classList.remove('show');setTimeout(()=>b.remove(),300)}
  };
}
window.addEventListener('appinstalled',()=>{markInstallDone();const b=document.getElementById('installBanner');if(b)b.remove()});
</script>
</body>
</html>
